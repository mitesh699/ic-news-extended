<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Initialized Portfolio Tracker</title>
    <meta name="description" content="AI-powered portfolio intelligence dashboard for Initialized Capital" />

    <meta property="og:title" content="Initialized Portfolio Tracker" />
    <meta property="og:description" content="AI-powered portfolio intelligence for seed-stage VC" />
    <meta property="og:type" content="website" />

    <!-- Prevent theme flicker: apply saved theme before React mounts -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'light';
          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(theme);
        } catch(e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
